<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MMQR Txn Monitoring</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f8f9fa;
    padding: 40px;
}

h1 {
    text-align: center;
    color: #333;
}

/* Search */
#searchBox {
    display: block;
    margin: 20px auto;
    padding: 12px;
    width: 420px;
    font-size: 16px;
    border-radius: 12px;
    border: 1px solid rgba(0,0,0,0.15);
    background: rgba(255,255,255,0.9);
}

/* Container */
.container {
    max-width: 1400px;
    margin: 0 auto;
}

/* Merchant Info */
.merchant-card {
    background: rgba(255,255,255,0.9);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
}

/* Txn Grid */
.txn-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

/* Txn Card */
.card {
    background: rgba(255,255,255,0.9);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.card h3 {
    margin-bottom: 10px;
}

/* Scroll Animation */
.fade-in {
    animation: fadeIn 0.6s ease-in-out;
}

@keyframes fadeIn {
    from {opacity:0; transform:translateY(10px);}
    to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<h1>MMQR Txn Monitoring</h1>

<input type="text" id="searchBox" placeholder="Enter MID or Merchant Name">

<div class="container">
    <div id="merchantInfo"></div>
    <div class="txn-grid" id="txnData"></div>
</div>

<script>
let sheetData = [];

// 🔗 Apps Script URL
const API_URL = "https://script.google.com/macros/s/AKfycbxZsaOuZl_ry_tERX_3qVQYB5tiAe8hNpbl2qIBRZoscb2tPzP3H3DhODJIoE8fwn5f/exec";

// Load data
fetch(API_URL)
.then(res => res.json())
.then(data => {
    sheetData = data;
    console.log("Data loaded:", sheetData.length);
});

// Search
document.getElementById("searchBox").addEventListener("keyup", function(){
    const keyword = this.value.trim().toLowerCase();

    const merchantDiv = document.getElementById("merchantInfo");
    const txnDiv = document.getElementById("txnData");

    merchantDiv.innerHTML = "";
    txnDiv.innerHTML = "";

    if(!keyword) return;

    sheetData.forEach(item => {
        const MID = (item["MID"] || "").toLowerCase();
        const name = (item["Merchant Name"] || "").toLowerCase();

        if(MID === keyword || name === keyword){

            // Merchant Info
            merchantDiv.innerHTML = `
            <div class="merchant-card fade-in">
                <p><b>Merchant Name:</b> ${item["Merchant Name"] || ""}</p>
                <p><b>MID:</b> ${item["MID"] || ""}</p>
                <p><b>Portal Status:</b> ${item["Portal Status"] || ""}</p>
                <p><b>MDR Offus:</b> ${item["MDR Offus"] || ""}</p>
            </div>`;

            // 2025 Txn
            let txn1 = `
            <div class="card fade-in">
                <h3>2025 Txn</h3>
                <p>March: ${item["March Count"]} / ${item["March Vol"]}</p>
                <p>April: ${item["April Count"]} / ${item["April Vol"]}</p>
                <p>May: ${item["May Count"]} / ${item["May Vol"]}</p>
                <p>Jun: ${item["Jun Count"]} / ${item["Jun Vol"]}</p>
                <p>July: ${item["July Count"]} / ${item["July Vol"]}</p>
                <p>Aug: ${item["Aug Count"]} / ${item["Aug Vol"]}</p>
                <p>Sept: ${item["Sept Count"]} / ${item["Sept Vol"]}</p>
                <p>Oct: ${item["Oct Count"]} / ${item["Oct Vol"]}</p>
                <p>Nov: ${item["Nov Count"]} / ${item["Nov Vol"]}</p>
                <p>Dec: ${item["Dec Count"]} / ${item["Dec Vol"]}</p>
            </div>`;

            // 2026 Txn
            let txn2 = `
            <div class="card fade-in">
                <h3>2026 Txn</h3>
                <p>Jan: ${item["Jan Count"]} / ${item["Jan Vol"]}</p>
                <p>Feb: ${item["Feb Count"]} / ${item["Feb Vol"]}</p>
                <p>March 26: ${item["March 26 Count"]} / ${item["March 26 Vol"]}</p>
            </div>`;

            txnDiv.innerHTML = txn1 + txn2;
        }
    });
});
</script>

</body>
</html>
