<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MMQR Txn Monitoring</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #eef2f7, #e3e9f2);
    padding: 40px;
}

h1 {
    text-align: center;
    color: #2c3e50;
}

/* Search */
#searchBox {
    display: block;
    margin: 20px auto;
    padding: 14px;
    width: 420px;
    border-radius: 14px;
    border: none;
    background: rgba(255,255,255,0.9);
}

/* Suggestion */
.suggestions {
    width: 420px;
    margin: -10px auto 10px auto;
    background: white;
    border-radius: 10px;
    max-height: 200px;
    overflow-y: auto;
}

.suggestion-item {
    padding: 10px;
    cursor: pointer;
}

.suggestion-item:hover {
    background: #f0f3f8;
}

/* Merchant */
.merchant-card {
    background: rgba(255,255,255,0.8);
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
}

/* Grid */
.txn-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

/* Card */
.card {
    background: rgba(255,255,255,0.85);
    padding: 20px;
    border-radius: 15px;
    overflow-x: auto;
}

/* Table */
table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 8px;
    border-bottom: 1px solid #ddd;
    white-space: nowrap;
}

canvas {
    max-height: 300px;
}
</style>
</head>

<body>

<h1>MMQR Txn Monitoring</h1>

<input type="text" id="searchBox" placeholder="Search MID or Merchant Name">
<div id="suggestions" class="suggestions"></div>

<div id="merchantInfo"></div>
<div class="txn-grid" id="txnData"></div>

<script>
let sheetData = [];
let volumeChart, countChart;

const API_URL = "https://script.google.com/macros/s/AKfycbxZsaOuZl_ry_tERX_3qVQYB5tiAe8hNpbl2qIBRZoscb2tPzP3H3DhODJIoE8fwn5f/exec";

// Load data
fetch(API_URL)
.then(res => res.json())
.then(data => {
    sheetData = data;
    console.log("Loaded:", data.length);
})
.catch(err => {
    alert("Data load error!");
    console.error(err);
});

// Safe value
function getVal(obj,key){
    return obj[key] ? obj[key] : 0;
}

// Search + Suggestion
const searchBox = document.getElementById("searchBox");
const suggestionBox = document.getElementById("suggestions");

searchBox.addEventListener("keyup", function(){
    const keyword = this.value.toLowerCase().trim();
    suggestionBox.innerHTML = "";

    if(!keyword) return;

    let matches = sheetData.filter(item =>
        (item["Merchant Name"]||"").toLowerCase().includes(keyword)
    ).slice(0,10);

    matches.forEach(item=>{
        let div = document.createElement("div");
        div.className = "suggestion-item";
        div.innerText = item["Merchant Name"];

        div.onclick = ()=>{
            searchBox.value = item["Merchant Name"];
            suggestionBox.innerHTML = "";
            showResult(item);
        };

        suggestionBox.appendChild(div);
    });
});

// Show Result
function showResult(item){

document.getElementById("merchantInfo").innerHTML = `
<div class="merchant-card">
<p><b>Merchant Name:</b> ${item["Merchant Name"]||""}</p>
<p><b>MID:</b> ${item["MID"]||""}</p>
<p><b>Portal Status:</b> ${item["Portal Status"]||""}</p>
<p><b>MDR Offus:</b> ${item["MDR Offus"]||""}</p>
</div>`;

document.getElementById("txnData").innerHTML = `

<div class="card">
<h3>2025 Txn</h3>
<table>
<tr><th>Month</th><th>Count</th><th>Volume</th></tr>
<tr><td>Mar</td><td>${getVal(item,"March Count")}</td><td>${getVal(item,"March Vol")}</td></tr>
<tr><td>Apr</td><td>${getVal(item,"April Count")}</td><td>${getVal(item,"April Vol")}</td></tr>
<tr><td>May</td><td>${getVal(item,"May Count")}</td><td>${getVal(item,"May Vol")}</td></tr>
<tr><td>Jun</td><td>${getVal(item,"Jun Count")}</td><td>${getVal(item,"Jun Vol")}</td></tr>
<tr><td>Jul</td><td>${getVal(item,"July Count")}</td><td>${getVal(item,"July Vol")}</td></tr>
<tr><td>Aug</td><td>${getVal(item,"Aug Count")}</td><td>${getVal(item,"Aug Vol")}</td></tr>
<tr><td>Sep</td><td>${getVal(item,"Sept Count")}</td><td>${getVal(item,"Sept Vol")}</td></tr>
<tr><td>Oct</td><td>${getVal(item,"Oct Count")}</td><td>${getVal(item,"Oct Vol")}</td></tr>
<tr><td>Nov</td><td>${getVal(item,"Nov Count")}</td><td>${getVal(item,"Nov Vol")}</td></tr>
<tr><td>Dec</td><td>${getVal(item,"Dec Count")}</td><td>${getVal(item,"Dec Vol")}</td></tr>
</table>
</div>

<div class="card">
<h3>2026 Txn</h3>
<table>
<tr><th>Month</th><th>Count</th><th>Volume</th></tr>
<tr><td>Jan</td><td>${getVal(item,"Jan Count")}</td><td>${getVal(item,"Jan Vol")}</td></tr>
<tr><td>Feb</td><td>${getVal(item,"Feb Count")}</td><td>${getVal(item,"Feb Vol")}</td></tr>
<tr><td>Mar26</td><td>${getVal(item,"March 26 Count")}</td><td>${getVal(item,"March 26 Vol")}</td></tr>
</table>
</div>

<div class="card">
<h3>Volume Trend</h3>
<canvas id="volumeChart"></canvas>
</div>

<div class="card">
<h3>Count Trend</h3>
<canvas id="countChart"></canvas>
</div>
`;

renderCharts(item);
}

// Charts
function renderCharts(item){

const months = ["Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec","Jan","Feb","Mar26"];

const volumeData = [
getVal(item,"March Vol"),getVal(item,"April Vol"),getVal(item,"May Vol"),
getVal(item,"Jun Vol"),getVal(item,"July Vol"),getVal(item,"Aug Vol"),
getVal(item,"Sept Vol"),getVal(item,"Oct Vol"),getVal(item,"Nov Vol"),
getVal(item,"Dec Vol"),getVal(item,"Jan Vol"),getVal(item,"Feb Vol"),
getVal(item,"March 26 Vol")
];

const countData = [
getVal(item,"March Count"),getVal(item,"April Count"),getVal(item,"May Count"),
getVal(item,"Jun Count"),getVal(item,"July Count"),getVal(item,"Aug Count"),
getVal(item,"Sept Count"),getVal(item,"Oct Count"),getVal(item,"Nov Count"),
getVal(item,"Dec Count"),getVal(item,"Jan Count"),getVal(item,"Feb Count"),
getVal(item,"March 26 Count")
];

if(volumeChart) volumeChart.destroy();
if(countChart) countChart.destroy();

volumeChart = new Chart(document.getElementById("volumeChart"), {
type:"line",
data:{labels:months,datasets:[{data:volumeData}]}
});

countChart = new Chart(document.getElementById("countChart"), {
type:"bar",
data:{labels:months,datasets:[{data:countData}]}
});
}
</script>

</body>
</html>
