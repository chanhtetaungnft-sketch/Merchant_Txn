<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MMQR Txn Monitoring</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #eef2f7, #e3e9f2);
    padding: 40px;
}

h1 {
    text-align: center;
    color: #2c3e50;
}

/* Search */
#searchBox {
    display: block;
    margin: 20px auto;
    padding: 14px;
    width: 420px;
    border-radius: 14px;
    border: none;
    background: rgba(255,255,255,0.85);
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
}

/* Suggestion */
.suggestions {
    width: 420px;
    margin: -10px auto 10px auto;
    background: white;
    border-radius: 10px;
    max-height: 200px;
    overflow-y: auto;
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
}

.suggestion-item {
    padding: 10px;
    cursor: pointer;
}

.suggestion-item:hover {
    background: #f0f3f8;
}

/* Merchant Card */
.merchant-card {
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
}

/* Grid */
.txn-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

/* Cards */
.card {
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    overflow-x: auto;
}

.card:hover {
    transform: translateY(-5px);
}

.table {
    width: 100%;
    border-collapse: collapse;
}

.table th, .table td {
    padding: 8px;
    border-bottom: 1px solid #eee;
    white-space: nowrap;
}

canvas {
    max-height: 300px;
}
</style>
</head>

<body>

<h1>MMQR Txn Monitoring</h1>

<input type="text" id="searchBox" placeholder="Search MID or Merchant Name">
<div id="suggestions" class="suggestions"></div>

<div id="merchantInfo"></div>
<div class="txn-grid" id="txnData"></div>

<script>
let sheetData = [];
let volumeChart, countChart;

const API_URL = "https://script.google.com/macros/s/AKfycbxZsaOuZl_ry_tERX_3qVQYB5tiAe8hNpbl2qIBRZoscb2tPzP3H3DhODJIoE8fwn5f/exec";

// Load Data
fetch(API_URL)
.then(res => res.json())
.then(data => sheetData = data);

// Search + Suggestion
const searchBox = document.getElementById("searchBox");
const suggestionBox = document.getElementById("suggestions");

searchBox.addEventListener("keyup", function(){
    const keyword = this.value.toLowerCase().trim();
    suggestionBox.innerHTML = "";

    if(!keyword) return;

    let matches = sheetData.filter(item => 
        (item["Merchant Name"] || "").toLowerCase().startsWith(keyword)
    ).slice(0,10);

    matches.forEach(item=>{
        let div = document.createElement("div");
        div.className = "suggestion-item";
        div.innerText = item["Merchant Name"];

        div.onclick = ()=>{
            searchBox.value = item["Merchant Name"];
            suggestionBox.innerHTML = "";
            showResult(item);
        };

        suggestionBox.appendChild(div);
    });

    sheetData.forEach(item=>{
        if((item["MID"]||"").toLowerCase()===keyword ||
           (item["Merchant Name"]||"").toLowerCase()===keyword){
            showResult(item);
        }
    });
});

// Show Result
function showResult(item){

document.getElementById("merchantInfo").innerHTML = `
<div class="merchant-card">
<p><b>Merchant Name:</b> ${item["Merchant Name"]}</p>
<p><b>MID:</b> ${item["MID"]}</p>
<p><b>Portal Status:</b> ${item["Portal Status"]}</p>
<p><b>MDR Offus:</b> ${item["MDR Offus"]}</p>
</div>`;

document.getElementById("txnData").innerHTML = `

<div class="card">
<h3>2025 Txn</h3>
<table class="table">
<tr><th>Month</th><th>Count</th><th>Volume</th></tr>
<tr><td>Mar</td><td>${item["March Count"]}</td><td>${item["March Vol"]}</td></tr>
<tr><td>Apr</td><td>${item["April Count"]}</td><td>${item["April Vol"]}</td></tr>
<tr><td>May</td><td>${item["May Count"]}</td><td>${item["May Vol"]}</td></tr>
<tr><td>Jun</td><td>${item["Jun Count"]}</td><td>${item["Jun Vol"]}</td></tr>
<tr><td>Jul</td><td>${item["July Count"]}</td><td>${item["July Vol"]}</td></tr>
<tr><td>Aug</td><td>${item["Aug Count"]}</td><td>${item["Aug Vol"]}</td></tr>
<tr><td>Sep</td><td>${item["Sept Count"]}</td><td>${item["Sept Vol"]}</td></tr>
<tr><td>Oct</td><td>${item["Oct Count"]}</td><td>${item["Oct Vol"]}</td></tr>
<tr><td>Nov</td><td>${item["Nov Count"]}</td><td>${item["Nov Vol"]}</td></tr>
<tr><td>Dec</td><td>${item["Dec Count"]}</td><td>${item["Dec Vol"]}</td></tr>
</table>
</div>

<div class="card">
<h3>2026 Txn</h3>
<table class="table">
<tr><th>Month</th><th>Count</th><th>Volume</th></tr>
<tr><td>Jan</td><td>${item["Jan Count"]}</td><td>${item["Jan Vol"]}</td></tr>
<tr><td>Feb</td><td>${item["Feb Count"]}</td><td>${item["Feb Vol"]}</td></tr>
<tr><td>Mar26</td><td>${item["March 26 Count"]}</td><td>${item["March 26 Vol"]}</td></tr>
</table>
</div>

<div class="card">
<h3>Txn Volume Trend</h3>
<canvas id="volumeChart"></canvas>
</div>

<div class="card">
<h3>Txn Count Trend</h3>
<canvas id="countChart"></canvas>
</div>
`;

renderCharts(item);
}

// Charts
function renderCharts(item){

const months = ["Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec","Jan","Feb","Mar26"];

const volumeData = [
item["March Vol"],item["April Vol"],item["May Vol"],item["Jun Vol"],
item["July Vol"],item["Aug Vol"],item["Sept Vol"],item["Oct Vol"],
item["Nov Vol"],item["Dec Vol"],item["Jan Vol"],item["Feb Vol"],
item["March 26 Vol"]
].map(x=>Number(x)||0);

const countData = [
item["March Count"],item["April Count"],item["May Count"],item["Jun Count"],
item["July Count"],item["Aug Count"],item["Sept Count"],item["Oct Count"],
item["Nov Count"],item["Dec Count"],item["Jan Count"],item["Feb Count"],
item["March 26 Count"]
].map(x=>Number(x)||0);

if(volumeChart) volumeChart.destroy();
if(countChart) countChart.destroy();

volumeChart = new Chart(document.getElementById("volumeChart"), {
type:"line",
data:{labels:months,datasets:[{data:volumeData}]}
});

countChart = new Chart(document.getElementById("countChart"), {
type:"bar",
data:{labels:months,datasets:[{data:countData}]}
});
}
</script>

</body>
</html>
